name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install

      # Run tests before build — catches regressions in lib/ algorithms
      - name: Run unit tests
        run: bun run test

      # Lint — catches unused vars, no-debugger, prefer-const, etc.
      - name: Lint
        run: bun run lint

      - name: Build static export
        run: bun run build
        env:
          NODE_ENV: production
          CI: "true"
      - run: touch out/.nojekyll
      - run: |
          test -f out/index.html || (echo "MISSING index.html" && exit 1)
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
